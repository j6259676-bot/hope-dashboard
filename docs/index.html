<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Hope 線上分部 — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
/* ── Design tokens (DESIGN.md) ── */
:root {
  --deep-blue:     #1D292E;
  --midnight-blue: #3C5464;
  --yellow:        #FFCC32;
  --sand:          #C8956A;
  --cream:         #EDE0D4;
  --cream-light:   #F6F0EA;
  --black:         #0D1618;

  --font-en: 'Montserrat', sans-serif;
  --font-zh: 'Noto Sans TC', 'PingFang TC', sans-serif;

  /* Semantic */
  --bg:         var(--deep-blue);
  --surface:    var(--midnight-blue);
  --card-bg:    rgba(60,84,100,.45);
  --border:     rgba(255,255,255,.1);
  --accent:     var(--yellow);
  --text:       #F6F0EA;
  --muted:      rgba(246,240,234,.55);
  --danger:     #E05C5C;
  --success:    #5CB87E;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-zh);
  min-height: 100vh;
  line-height: 1.65;
}

/* ── LOGIN ── */
#login-overlay {
  position: fixed; inset: 0;
  background: var(--black);
  display: flex; align-items: center; justify-content: center; z-index: 9999;
}
.login-box {
  background: var(--deep-blue);
  border: 1px solid rgba(255,204,50,.2);
  border-radius: 16px; padding: 40px;
  width: min(440px, 92vw); text-align: center;
  box-shadow: 0 16px 48px rgba(13,22,24,.6);
}
.login-logo {
  font-family: var(--font-en); font-weight: 800;
  font-size: 11px; letter-spacing: .14em; text-transform: uppercase;
  color: var(--yellow); margin-bottom: 4px;
}
.login-box h1 {
  font-family: var(--font-en); font-weight: 800;
  font-size: 1.35rem; color: var(--text); margin-bottom: 6px;
}
.login-box p { color: var(--muted); font-size: .85rem; margin-bottom: 28px; }
.login-box label {
  display: block; text-align: left;
  font-size: .75rem; font-family: var(--font-en); font-weight: 700;
  letter-spacing: .06em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 5px;
}
.login-box input {
  width: 100%; padding: 11px 14px;
  background: rgba(255,255,255,.06);
  border: 1.5px solid rgba(255,255,255,.15);
  border-radius: 8px; color: var(--text);
  font-family: var(--font-zh); font-size: .9rem;
  margin-bottom: 16px; outline: none;
  transition: border-color 150ms;
}
.login-box input:focus { border-color: var(--yellow); }
.btn-primary {
  width: 100%; padding: 12px 24px;
  background: var(--yellow); color: var(--deep-blue);
  font-family: var(--font-en); font-weight: 700;
  font-size: 13px; letter-spacing: .06em; text-transform: uppercase;
  border: none; border-radius: 8px; cursor: pointer;
  transition: opacity 150ms, transform 150ms;
}
.btn-primary:hover { opacity: .88; transform: translateY(-1px); }
#login-error { color: var(--danger); font-size: .8rem; margin-top: 10px; display: none; }

/* ── APP LAYOUT ── */
#app { display: none; flex-direction: column; min-height: 100vh; }

header {
  background: var(--black);
  border-bottom: 1px solid rgba(255,204,50,.12);
  padding: 0 32px; height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.brand {
  font-family: var(--font-en); font-weight: 800;
  font-size: 13px; letter-spacing: .1em; text-transform: uppercase;
  color: var(--yellow);
}
.brand-sub {
  font-weight: 400; letter-spacing: .04em; color: var(--muted);
  margin-left: 10px; font-size: 11px;
}
.btn-logout {
  background: transparent;
  border: 1.5px solid rgba(255,255,255,.2);
  color: var(--muted); padding: 5px 14px; border-radius: 6px;
  font-family: var(--font-en); font-size: 11px; font-weight: 700;
  letter-spacing: .06em; text-transform: uppercase;
  cursor: pointer; transition: all 150ms;
}
.btn-logout:hover { border-color: var(--yellow); color: var(--yellow); }

main {
  padding: 32px; max-width: 1400px;
  margin: 0 auto; width: 100%; flex: 1;
}

/* ── SECTIONS ── */
section { margin-bottom: 48px; }
.section-header {
  margin-bottom: 20px; padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: baseline; gap: 12px;
}
.section-title {
  font-family: var(--font-en); font-weight: 700;
  font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
  color: var(--yellow);
}
.section-sub { font-size: .78rem; color: var(--muted); }

/* ── CARDS ── */
.card {
  background: var(--card-bg);
  backdrop-filter: blur(4px);
  border: 1px solid var(--border);
  border-radius: 12px; padding: 20px;
}
.card-title {
  font-family: var(--font-en); font-weight: 700;
  font-size: 10px; letter-spacing: .1em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 14px;
}
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
@media(max-width: 768px) {
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
  main { padding: 20px; }
}

/* ── MAP ── */
#map {
  height: 360px; border-radius: 10px;
  border: 1px solid var(--border); margin-bottom: 16px;
}
.leaflet-container { background: #16202a !important; }

/* ── STATS ── */
.stat-card { text-align: center; padding: 24px 12px; }
.stat-num {
  font-family: var(--font-en); font-weight: 800;
  font-size: 2.2rem; color: var(--yellow); line-height: 1;
}
.stat-label { font-size: .75rem; color: var(--muted); margin-top: 6px; }
.stat-badge { margin-top: 2px; }

/* ── BADGES ── */
.badge-danger {
  display: inline-flex; align-items: center; gap: 5px;
  background: rgba(224,92,92,.15); color: var(--danger);
  border: 1px solid rgba(224,92,92,.35); border-radius: 9999px;
  padding: 3px 10px; font-size: .76rem; font-weight: 600;
}
.badge-ok {
  display: inline-flex; align-items: center; gap: 5px;
  background: rgba(92,184,126,.12); color: var(--success);
  border: 1px solid rgba(92,184,126,.25); border-radius: 9999px;
  padding: 3px 10px; font-size: .76rem; font-weight: 600;
}

/* ── RANK LIST ── */
.rank-list { list-style: none; }
.rank-list li {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,.06);
  font-size: .85rem;
}
.rank-list li:last-child { border-bottom: none; }
.rn { font-family: var(--font-en); font-weight: 700; color: var(--yellow); width: 20px; text-align: right; flex-shrink: 0; }
.nm { flex: 1; }
.bw { width: 70px; background: rgba(255,255,255,.08); border-radius: 3px; height: 5px; flex-shrink: 0; }
.bf { height: 5px; border-radius: 3px; background: var(--sand); }
.ct { color: var(--muted); font-size: .78rem; white-space: nowrap; }

/* ── CHART ── */
.chart-wrap { position: relative; height: 220px; }

/* ── YOUTUBE TABLE ── */
.tbl-scroll { overflow-x: auto; }
.yt-tbl { width: 100%; border-collapse: collapse; font-size: .82rem; }
.yt-tbl th {
  text-align: left; padding: 8px 12px;
  color: var(--muted); font-family: var(--font-en);
  font-size: 10px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
  border-bottom: 1px solid var(--border); white-space: nowrap;
}
.yt-tbl td { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,.04); }
.yt-tbl tr:hover td { background: rgba(255,204,50,.04); }
.sess-tag {
  background: rgba(255,204,50,.12); color: var(--yellow);
  border-radius: 4px; padding: 2px 7px;
  font-family: var(--font-en); font-size: .72rem; font-weight: 700;
  letter-spacing: .04em; white-space: nowrap;
}
.yt-tbl a { color: var(--muted); text-decoration: none; transition: color 150ms; }
.yt-tbl a:hover { color: var(--yellow); }
.yt-note {
  text-align: center; padding: 32px 16px; color: var(--muted); font-size: .85rem;
  border: 1.5px dashed rgba(255,255,255,.12); border-radius: 8px; margin-top: 4px;
}
.yt-note strong {
  display: block; color: var(--text); margin-bottom: 6px;
  font-family: var(--font-en); font-size: .8rem; letter-spacing: .04em;
}

/* ── LOADING / MISC ── */
.loading { text-align: center; color: var(--muted); padding: 40px; font-size: .88rem; }
.spinner {
  width: 28px; height: 28px;
  border: 2.5px solid rgba(255,255,255,.1);
  border-top-color: var(--yellow);
  border-radius: 50%; animation: spin .7s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.last-ts { text-align: right; color: var(--muted); font-size: .72rem; margin-top: 8px; }
.err-msg { color: var(--danger); padding: 20px; font-size: .85rem; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-overlay">
  <div class="login-box">
    <div class="login-logo">The Hope</div>
    <h1>線上分部 Dashboard</h1>
    <p>Admin 管理介面，請輸入存取資訊</p>
    <label>GAS 部署網址</label>
    <input id="inp-url" type="url" placeholder="https://script.google.com/macros/s/…/exec">
    <label>Dashboard Token</label>
    <input id="inp-token" type="password" placeholder="管理密碼">
    <button class="btn-primary" onclick="doLogin()">進入 Dashboard</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div>
      <span class="brand">The Hope</span>
      <span class="brand-sub">線上分部 Dashboard</span>
    </div>
    <button class="btn-logout" onclick="doLogout()">登出</button>
  </header>
  <main>

    <!-- GEO -->
    <section>
      <div class="section-header">
        <span class="section-title">地理分佈</span>
        <span class="section-sub">家人所在城市與國家分佈</span>
      </div>
      <div id="geo-loading" class="loading"><div class="spinner"></div>載入中…</div>
      <div id="geo-content" style="display:none">
        <div id="map"></div>
        <div class="grid-2">
          <div class="card"><div class="card-title">國家排行</div><ul class="rank-list" id="country-list"></ul></div>
          <div class="card"><div class="card-title">城市排行</div><ul class="rank-list" id="city-list"></ul></div>
        </div>
        <div class="last-ts" id="geo-ts"></div>
      </div>
    </section>

    <!-- GROWTH -->
    <section>
      <div class="section-header">
        <span class="section-title">成長指標</span>
        <span class="section-sub">近 12 週出席趨勢與新朋友人數</span>
      </div>
      <div id="growth-loading" class="loading"><div class="spinner"></div>載入中…</div>
      <div id="growth-content" style="display:none">
        <div class="grid-3" style="margin-bottom:16px">
          <div class="card stat-card"><div class="stat-num" id="sw">—</div><div class="stat-label">統計週數</div></div>
          <div class="card stat-card"><div class="stat-num" id="sa">—</div><div class="stat-label">平均週出席</div></div>
          <div class="card stat-card"><div class="stat-badge" id="sb"></div><div class="stat-label" style="margin-top:10px">出席趨勢</div></div>
        </div>
        <div class="grid-2">
          <div class="card"><div class="card-title">週出席人數（近 12 週）</div><div class="chart-wrap"><canvas id="ca"></canvas></div></div>
          <div class="card"><div class="card-title">每週新朋友人數</div><div class="chart-wrap"><canvas id="cn"></canvas></div></div>
        </div>
        <div class="last-ts" id="growth-ts"></div>
      </div>
    </section>

    <!-- YOUTUBE -->
    <section>
      <div class="section-header">
        <span class="section-title">YouTube 主日直播</span>
        <span class="section-sub">每週主日後自動同步，最新 36 筆</span>
      </div>
      <div id="yt-loading" class="loading"><div class="spinner"></div>載入中…</div>
      <div id="yt-content" style="display:none">
        <div id="yt-note-area"></div>
        <div class="card tbl-scroll" id="yt-table-wrap" style="display:none">
          <table class="yt-tbl">
            <thead><tr><th>日期</th><th>場次</th><th>標題</th><th>觀看</th><th>按讚</th><th>留言</th><th>同時在線</th></tr></thead>
            <tbody id="yt-tbody"></tbody>
          </table>
        </div>
        <div class="last-ts" id="yt-ts"></div>
      </div>
    </section>

  </main>
</div>

<script>
/* ── City / Country coords ── */
const CC={
  '台北':[25.033,121.565],'台北市':[25.033,121.565],'新北':[25.012,121.466],'新北市':[25.012,121.466],
  '桃園':[24.993,121.301],'台中':[24.148,120.673],'台中市':[24.148,120.673],'台南':[22.999,120.227],
  '高雄':[22.627,120.301],'高雄市':[22.627,120.301],'新竹':[24.803,120.971],'基隆':[25.128,121.739],
  '花蓮':[23.991,121.601],'宜蘭':[24.754,121.754],'台東':[22.757,121.144],
  'Taipei':[25.033,121.565],'Taichung':[24.148,120.673],'Kaohsiung':[22.627,120.301],'Tainan':[22.999,120.227],
  '吉隆坡':[3.139,101.687],'Kuala Lumpur':[3.139,101.687],'KL':[3.139,101.687],
  '新加坡':[1.352,103.820],'Singapore':[1.352,103.820],
  '曼谷':[13.756,100.502],'Bangkok':[13.756,100.502],
  '香港':[22.320,114.170],'Hong Kong':[22.320,114.170],
  '北京':[39.904,116.407],'上海':[31.230,121.473],'廣州':[23.129,113.264],'深圳':[22.543,114.058],
  '洛杉磯':[34.052,-118.244],'Los Angeles':[34.052,-118.244],'LA':[34.052,-118.244],
  '紐約':[40.713,-74.006],'New York':[40.713,-74.006],'NYC':[40.713,-74.006],
  '舊金山':[37.774,-122.419],'San Francisco':[37.774,-122.419],'SF':[37.774,-122.419],
  '西雅圖':[47.606,-122.332],'Seattle':[47.606,-122.332],
  '多倫多':[43.653,-79.383],'Toronto':[43.653,-79.383],
  '溫哥華':[49.247,-123.117],'Vancouver':[49.247,-123.117],
  '雪梨':[-33.868,151.209],'Sydney':[-33.868,151.209],
  '墨爾本':[-37.814,144.963],'Melbourne':[-37.814,144.963],
  '倫敦':[51.507,-0.128],'London':[51.507,-0.128],
  '東京':[35.690,139.692],'Tokyo':[35.690,139.692],
  '首爾':[37.566,126.978],'Seoul':[37.566,126.978],
  '雅加達':[-6.208,106.846],'Jakarta':[-6.208,106.846],
  '馬尼拉':[14.599,120.984],'Manila':[14.599,120.984],
};
const RC={
  '台灣':[23.7,121.0],'Taiwan':[23.7,121.0],
  '馬來西亞':[3.1,101.7],'Malaysia':[3.1,101.7],
  '新加坡':[1.35,103.82],'Singapore':[1.35,103.82],
  '美國':[37.1,-95.7],'United States':[37.1,-95.7],'USA':[37.1,-95.7],
  '加拿大':[56.1,-106.3],'Canada':[56.1,-106.3],
  '澳洲':[-25.3,133.8],'Australia':[-25.3,133.8],
  '日本':[36.2,138.3],'Japan':[36.2,138.3],
  '英國':[55.4,-3.4],'United Kingdom':[55.4,-3.4],'UK':[55.4,-3.4],
  '中國':[35.9,104.2],'China':[35.9,104.2],
  '香港':[22.32,114.17],'Hong Kong':[22.32,114.17],
  '泰國':[15.9,100.9],'Thailand':[15.9,100.9],
  '印尼':[-0.8,113.9],'Indonesia':[-0.8,113.9],
  '菲律賓':[12.9,121.8],'Philippines':[12.9,121.8],
  '越南':[14.1,108.3],'Vietnam':[14.1,108.3],
  '韓國':[35.9,127.8],'South Korea':[35.9,127.8],
};

let GAS_URL='', TOKEN='';

function doLogin(){
  const u=document.getElementById('inp-url').value.trim();
  const t=document.getElementById('inp-token').value.trim();
  if(!u||!t){showErr('請填寫網址和 Token');return;}
  GAS_URL=u; TOKEN=t;
  localStorage.setItem('hd_u',u); localStorage.setItem('hd_t',t);
  startApp();
}
function doLogout(){localStorage.removeItem('hd_u');localStorage.removeItem('hd_t');location.reload();}
function showErr(m){const e=document.getElementById('login-error');e.textContent='× '+m;e.style.display='block';}

function startApp(){
  document.getElementById('login-overlay').style.display='none';
  document.getElementById('app').style.display='flex';
  loadGeo(); loadGrowth(); loadYt();
}

function api(action){
  return fetch(GAS_URL+'?action='+action+'&token='+encodeURIComponent(TOKEN))
    .then(r=>r.json());
}

/* ── GEO ── */
let mapI=null;
function loadGeo(){
  api('geo').then(d=>{
    if(d.error){showSec('geo',false,d.error);return;}
    showSec('geo',true);
    renderMap(d.cities,d.countries);
    rankList('country-list',d.countries.slice(0,10),'country','count');
    rankList('city-list',d.cities.slice(0,10).map(c=>({name:c.city,count:c.count})),'name','count');
    ts('geo-ts');
  }).catch(e=>showSec('geo',false,e.message));
}
function renderMap(cities,countries){
  if(mapI){mapI.remove();}
  mapI=L.map('map',{scrollWheelZoom:false}).setView([20,110],2);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
    attribution:'© OpenStreetMap © CARTO',subdomains:'abcd',maxZoom:19
  }).addTo(mapI);
  const mx=Math.max(...countries.map(c=>c.count),1);
  cities.forEach(c=>{
    const co=CC[c.city]||CC[c.city.trim()]||RC[c.country]||RC[c.country.trim()];
    if(!co)return;
    const r=6+Math.round((c.count/mx)*14);
    L.circleMarker(co,{radius:r,color:'#FFCC32',fillColor:'#FFCC32',fillOpacity:.5,weight:1.5})
      .addTo(mapI).bindPopup('<b>'+c.city+'</b><br>'+c.country+'<br>'+c.count+' 人');
  });
}
function rankList(id,items,nk,ck){
  const ul=document.getElementById(id); ul.innerHTML='';
  const mx=items.length?items[0][ck]:1;
  items.forEach((it,i)=>{
    const p=Math.round((it[ck]/mx)*100);
    ul.innerHTML+=`<li><span class="rn">${i+1}</span><span class="nm">${it[nk]}</span>`+
      `<div class="bw"><div class="bf" style="width:${p}%"></div></div>`+
      `<span class="ct">${it[ck]} 人</span></li>`;
  });
}

/* ── GROWTH ── */
let cA=null,cN=null;
function loadGrowth(){
  api('growth').then(d=>{
    if(d.error){showSec('growth',false,d.error);return;}
    showSec('growth',true);
    const tr=d.attendanceTrend||[], nr=d.newPeopleTrend||[];
    document.getElementById('sw').textContent=tr.length||'—';
    document.getElementById('sa').textContent=tr.length?Math.round(tr.reduce((s,w)=>s+w.total,0)/tr.length):'—';
    document.getElementById('sb').innerHTML=d.alert
      ?'<span class="badge-danger">連續下滑警示</span>'
      :'<span class="badge-ok">趨勢正常</span>';
    const lb=tr.map(w=>w.week.replace(/^\d{4}-/,''));
    const opt={responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'rgba(246,240,234,.55)',font:{size:11,family:'Montserrat'},boxWidth:12}}},
      scales:{x:{ticks:{color:'rgba(246,240,234,.45)',font:{size:10},maxRotation:45},grid:{color:'rgba(255,255,255,.05)'}},
              y:{ticks:{color:'rgba(246,240,234,.45)',font:{size:10}},grid:{color:'rgba(255,255,255,.05)'},beginAtZero:true}}};
    if(cA)cA.destroy();
    cA=new Chart(document.getElementById('ca'),{type:'line',data:{labels:lb,datasets:[
      {label:'合計',data:tr.map(w=>w.total),borderColor:'#FFCC32',backgroundColor:'rgba(255,204,50,.08)',tension:.35,borderWidth:2.5,fill:true,pointRadius:3},
      {label:'9:30',data:tr.map(w=>w.s930),borderColor:'#7eb8e0',backgroundColor:'transparent',tension:.35,borderWidth:1.5,pointRadius:2},
      {label:'11:30',data:tr.map(w=>w.s1130),borderColor:'#C8956A',backgroundColor:'transparent',tension:.35,borderWidth:1.5,pointRadius:2},
      {label:'2PM',data:tr.map(w=>w.s200),borderColor:'#5CB87E',backgroundColor:'transparent',tension:.35,borderWidth:1.5,pointRadius:2},
    ]},options:opt});
    if(cN)cN.destroy();
    cN=new Chart(document.getElementById('cn'),{type:'bar',data:{
      labels:nr.map(w=>w.week.replace(/^\d{4}-/,'')),
      datasets:[{label:'新朋友',data:nr.map(w=>w.count),backgroundColor:'rgba(200,149,106,.65)',borderRadius:4}]
    },options:opt});
    ts('growth-ts');
  }).catch(e=>showSec('growth',false,e.message));
}

/* ── YOUTUBE ── */
function loadYt(){
  api('youtube').then(d=>{
    if(d.error){showSec('yt',false,d.error);return;}
    showSec('yt',true);
    const rows=d.rows||[], note=d.note||'';
    const noteArea=document.getElementById('yt-note-area');
    const tblWrap=document.getElementById('yt-table-wrap');
    const tb=document.getElementById('yt-tbody');

    if(!rows.length){
      tblWrap.style.display='none';
      noteArea.innerHTML=`<div class="yt-note"><strong>尚無 YouTube 數據</strong>`+
        (note?note:'請在 GAS 編輯器手動執行一次 syncYoutubeData()，或等週日 22:00 自動觸發。')+`</div>`;
    } else {
      noteArea.innerHTML='';
      tblWrap.style.display='';
      tb.innerHTML='';
      rows.forEach(r=>{
        const vid=r['影片ID']||'';
        tb.innerHTML+=`<tr>
          <td>${fmtD(r['日期'])}</td>
          <td><span class="sess-tag">${r['場次']||'—'}</span></td>
          <td><a href="https://youtu.be/${vid}" target="_blank">${trunc(r['標題']||'—',40)}</a></td>
          <td>${fmtN(r['觀看次數'])}</td><td>${fmtN(r['按讚數'])}</td>
          <td>${fmtN(r['留言數'])}</td><td>${r['最高同時在線']||'—'}</td>
        </tr>`;
      });
    }
    ts('yt-ts');
  }).catch(e=>showSec('yt',false,e.message));
}

/* ── Helpers ── */
function showSec(k,ok,err){
  document.getElementById(k+'-loading').style.display='none';
  if(ok){document.getElementById(k+'-content').style.display='';}
  else{
    const ld=document.getElementById(k+'-loading');
    ld.innerHTML='<div class="err-msg">× '+(err||'載入失敗')+'</div>';
    ld.style.display='';
  }
}
function ts(id){document.getElementById(id).textContent='更新於 '+new Date().toLocaleString('zh-TW',{hour12:false});}
function fmtN(n){return(n==null||n==='')?'—':Number(n).toLocaleString();}
function fmtD(d){return d?String(d).substring(0,10):'—';}
function trunc(s,n){return s.length>n?s.substring(0,n)+'…':s;}

/* ── Init ── */
(function(){
  const u=localStorage.getItem('hd_u'),t=localStorage.getItem('hd_t');
  if(u&&t){
    document.getElementById('inp-url').value=u;
    document.getElementById('inp-token').value=t;
    GAS_URL=u; TOKEN=t; startApp();
  }
})();
</script>
